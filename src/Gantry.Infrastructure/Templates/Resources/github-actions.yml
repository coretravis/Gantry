# This workflow is generated by Gantry's GithubActionsGenerator.
# MAINTAINER NOTE: Keep this template aligned with DeployCommandHandler in DeployCommand.cs.
# Any change to the deploy sequence in C# must be reflected here.
name: Deploy {{app_name}} to {{server_host}}

on:
  push:
    branches:
      - {{branch}}
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET {{runtime_version}}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '{{runtime_version}}'

      - name: Restore dependencies
        run: dotnet restore {{project_path}}

      - name: Build
        run: dotnet build {{project_path}} --no-restore --configuration Release

      - name: {{test_step_name}}
        run: {{test_step_run}}

      - name: Publish
        run: dotnet publish {{project_path}} -c Release -o ./publish --runtime linux-x64 --self-contained false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: Production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-publish
          path: ./publish

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          RELEASE_ID="${{ github.sha }}-$(date -u +%Y%m%d-%H%M%S)"
          RELEASE_PATH="/var/www/{{app_name}}/releases/$RELEASE_ID"
          CURRENT_LINK="/var/www/{{app_name}}/current"
          ARCHIVE="/tmp/gantry-$RELEASE_ID.tar.gz"

          ssh -i ~/.ssh/deploy_key $DO_USER@$DO_HOST "mkdir -p $RELEASE_PATH"
          tar czf - -C ./publish . | ssh -i ~/.ssh/deploy_key $DO_USER@$DO_HOST "cat > $ARCHIVE && tar xzf $ARCHIVE -C $RELEASE_PATH && rm -f $ARCHIVE"

          ssh -i ~/.ssh/deploy_key $DO_USER@$DO_HOST "ln -sfn $RELEASE_PATH $CURRENT_LINK && sudo systemctl restart {{app_name}}.service"

          ssh -i ~/.ssh/deploy_key $DO_USER@$DO_HOST "ls -1dt /var/www/{{app_name}}/releases/*/ 2>/dev/null | tail -n +$(({{releases_to_keep}} + 1)) | xargs rm -rf"

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          for i in $(seq 1 {{health_check_retries}}); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" {{health_check_url}} || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after {{health_check_retries}} attempts"
          exit 1
